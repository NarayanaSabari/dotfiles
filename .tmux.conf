# tmux config - agent cockpit. Brewer dark palette to match WezTerm + Claude Code theme.

# --- Claude Code requirements (docs: terminal-config) ---
set -g allow-passthrough on           # notifications + progress reach the outer terminal
set -s extended-keys on               # Shift+Enter newline works inside tmux
set -as terminal-features 'xterm*:extkeys'

# --- Terminal behavior ---
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:RGB'
set -g mouse on
set -g history-limit 50000
set -s escape-time 10
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S:#W"

# --- Windows: one window = one agent/worktree ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# --- Attention bell: Claude rings terminal bell; sidebar shows the red dot ---
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# --- Agent sidebar (right side, per window) ---
set-environment -g TMUX_SIDEBAR_WIDTH 24
set-hook -g after-new-window 'run-shell "~/.tmux/sidebar-attach.sh"'
set-hook -g session-created  'run-shell "~/.tmux/sidebar-attach-all.sh"'
bind b run-shell '~/.tmux/sidebar-toggle.sh'

# --- Popups: actions without new windows ---
bind g display-popup -E -w 70% -h 60% -d '#{pane_current_path}'
bind S display-popup -E -w 80% -h 70% -d '#{pane_current_path}' 'zsh -c "git -c color.status=always status; printf \"\n[press any key]\"; read -k1 -s"'

# --- Keys ---
setw -g mode-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
# Alt+number: jump straight to a window (agent session) without the prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
# Alt+arrows: move between panes without the prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Status bar: hidden (the right sidebar is the chrome). `set -g status on` to bring it back. ---
set -g status off

# --- Status bar styling (used if re-enabled) ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#0c0d0e,fg=#b7b8b9"
set -g status-left-length 30
set -g status-left "#[fg=#756bb1,bold] #S #[fg=#515253]| "
set -g status-right "#[fg=#737475]%H:%M "
setw -g window-status-format "#[fg=#737475] #I:#W "
setw -g window-status-current-format "#[fg=#dca060,bold] #I:#W "
setw -g window-status-activity-style "fg=#e6550d"
set -g monitor-activity on
set -g visual-activity off
set -g pane-border-style "fg=#2e2f30"
set -g pane-active-border-style "fg=#756bb1"
set -g message-style "bg=#2e2f30,fg=#dadbdc"

# --- Plugins: survive reboots (tpm + resurrect + continuum) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-hook-post-restore-all '~/.tmux/sidebar-attach-all.sh'
run '~/.tmux/plugins/tpm/tpm'
